<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#0c1222">
  <title>SEO Dashboard — Toledo Swift Haul</title>
  <link rel="stylesheet" href="/seo/styles.css">
</head>
<body>
  <div id="login-view" class="login-panel">
    <div class="login-brand">
      <div class="login-icon" aria-hidden="true">📈</div>
      <h2>SEO Dashboard</h2>
      <p class="login-sub">Track rankings, health &amp; search progress</p>
    </div>
    <label for="api-base">API URL</label>
    <input id="api-base" type="url" value="https://api.toledoswifthaul.com" autocomplete="url">
    <label for="password">Password</label>
    <input id="password" type="text" autocomplete="off" value="ToledoSwift2026" spellcheck="false">
    <button type="button" id="login-btn">Open Dashboard</button>
    <p id="login-error" class="error hidden"></p>
  </div>

  <div id="app-view" class="hidden">
    <header class="topbar">
      <div class="topbar-main">
        <p class="eyebrow">SEO Monitor</p>
        <h1 id="site-name">Toledo Swift Haul</h1>
        <p class="site-url" id="site-url">toledoswifthaul.com</p>
      </div>
      <div class="topbar-actions">
        <button type="button" id="refresh-btn" class="icon-btn" title="Refresh data">↻</button>
        <button type="button" id="logout-btn" class="icon-btn" title="Log out">⎋</button>
      </div>
    </header>

    <section class="score-hero" aria-live="polite">
      <div class="score-ring-wrap">
        <svg class="score-ring" viewBox="0 0 120 120" aria-hidden="true">
          <circle class="ring-bg" cx="60" cy="60" r="52"></circle>
          <circle class="ring-fill" id="score-ring" cx="60" cy="60" r="52"></circle>
        </svg>
        <div class="score-center">
          <span class="score-value" id="health-score">—</span>
          <span class="score-label">Health</span>
        </div>
      </div>
      <div class="score-meta">
        <p class="score-delta" id="score-delta"></p>
        <p class="score-updated" id="last-updated">Checking…</p>
      </div>
    </section>

    <nav class="tabs" role="tablist" aria-label="Dashboard sections">
      <button type="button" class="tab active" data-tab="overview" role="tab" aria-selected="true">Overview</button>
      <button type="button" class="tab" data-tab="rankings" role="tab">Rankings</button>
      <button type="button" class="tab" data-tab="technical" role="tab">Technical</button>
      <button type="button" class="tab" data-tab="setup" role="tab">Setup</button>
    </nav>

    <main class="panels">
      <section id="panel-overview" class="panel active" role="tabpanel">
        <div class="metric-grid" id="metric-grid"></div>
        <h2 class="section-title">14-day trend</h2>
        <div class="trend-chart" id="trend-chart"></div>
        <h2 class="section-title">Leads from site</h2>
        <div class="card" id="leads-card"></div>
        <h2 class="section-title">Search automation</h2>
        <div class="card" id="automation-card"></div>
      </section>

      <section id="panel-rankings" class="panel" role="tabpanel" hidden>
        <p class="panel-intro" id="rankings-intro">Keyword positions in Google (Toledo, OH).</p>
        <div id="rankings-list"></div>
      </section>

      <section id="panel-technical" class="panel" role="tabpanel" hidden>
        <div class="card" id="pagespeed-card"></div>
        <h2 class="section-title">On-page checks</h2>
        <ul class="check-list" id="check-list"></ul>
      </section>

      <section id="panel-setup" class="panel" role="tabpanel" hidden>
        <p class="panel-intro">Connect these for fuller daily reports.</p>
        <div class="setup-list" id="setup-list"></div>
      </section>
    </main>

    <p id="load-error" class="error banner hidden"></p>
  </div>

  <script src="/seo/app.js?v=2" defer></script>
</body>
</html>
